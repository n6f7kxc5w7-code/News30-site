<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News30 — Pipeline Test</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #0f0f0f; color: #f1f1f1; font-family: -apple-system, Roboto, sans-serif; padding: 24px 16px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  p.sub { color: #aaa; font-size: 13px; margin: 0 0 24px; }
  .card { background: #1a1a1a; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  label { font-size: 12px; color: #aaa; display: block; margin-bottom: 4px; }
  input, select, textarea { width: 100%; background: #0f0f0f; border: 1px solid #333; border-radius: 8px; padding: 10px 12px; color: #fff; font-size: 14px; margin-bottom: 12px; font-family: inherit; }
  textarea { resize: vertical; }
  button { width: 100%; padding: 12px 16px; border-radius: 10px; border: none; cursor: pointer; background: #3ea6ff; color: #04182b; font-weight: 700; font-size: 14px; margin-bottom: 12px; }
  button:disabled { background: #2a2a2a; color: #666; cursor: default; }
  .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; color: #fff; background: #666; }
  .meta { font-size: 12px; color: #aaa; margin-bottom: 8px; }
  audio, video { width: 100%; border-radius: 8px; margin-top: 4px; }
  #log { display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; }
  .logline { font-size: 12.5px; color: #ccc; font-family: monospace; }
  .logtime { color: #666; }
</style>
</head>
<body>
<div class="wrap">
  <h1>News30 — Video Pipeline Test</h1>
  <p class="sub">Runs on news30.live itself, so there's no cross-origin issue — same domain calling its own API.</p>

  <div class="card">
    <label>Headline</label>
    <input id="headline" value="EU leaders strike provisional deal on joint defence fund">

    <label>Category</label>
    <select id="category">
      <option value="geopolitics">Geopolitics</option>
      <option value="finance">Finance</option>
      <option value="sports">Sports</option>
    </select>

    <label>Script (edit freely for testing)</label>
    <textarea id="script" rows="4">Your news in 30 seconds. EU leaders just struck a provisional deal on a joint defence fund after an overnight summit. The agreement still needs approval from national parliaments before it takes effect. Financing details between member states remain unresolved. More on this as ratification votes begin across Europe.</textarea>
  </div>

  <button id="btnAudio">Step 1 — Generate audio</button>
  <button id="btnVideo" disabled>Step 2 — Generate video</button>

  <div class="card">
    <div class="row">
      <strong>Status</strong>
      <span class="pill" id="statusPill">not started</span>
    </div>
    <div class="meta" id="jobMeta"></div>
    <div id="audioBox"></div>
    <div id="videoBox"></div>
  </div>

  <div class="card">
    <strong>Log</strong>
    <div id="log" style="margin-top:8px;"></div>
  </div>
</div>

<script>
  let jobId = null, audioUrl = null, renderId = null, pollTimer = null;

  function addLog(line) {
    const el = document.getElementById('log');
    const time = new Date().toLocaleTimeString();
    const div = document.createElement('div');
    div.className = 'logline';
    div.innerHTML = '<span class="logtime">' + time + '</span> — ' + line;
    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
  }

  function setStatus(s) {
    const pill = document.getElementById('statusPill');
    pill.textContent = s || 'not started';
    pill.style.background = s === 'done' ? '#2ba640' : s === 'failed' ? '#ff4e45' : s ? '#3ea6ff' : '#666';
  }

  document.getElementById('btnAudio').addEventListener('click', async () => {
    const btn = document.getElementById('btnAudio');
    btn.disabled = true; btn.textContent = 'Generating audio…';
    addLog('Calling /api/generate-audio ...');
    try {
      const script = document.getElementById('script').value;
      const r = await fetch('/api/generate-audio', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ storyId: 'test-' + Date.now(), script }),
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || ('Request failed: ' + r.status));
      jobId = data.jobId; audioUrl = data.audioUrl;
      addLog('✅ Audio ready. Job id: ' + jobId);
      document.getElementById('jobMeta').textContent = 'Job id: ' + jobId;
      document.getElementById('audioBox').innerHTML =
        '<div class="meta">Narration audio:</div><audio controls src="' + audioUrl + '"></audio>';
      document.getElementById('btnVideo').disabled = false;
    } catch (e) {
      addLog('❌ ' + e.message);
    }
    btn.disabled = false; btn.textContent = 'Step 1 — Generate audio';
  });

  document.getElementById('btnVideo').addEventListener('click', async () => {
    if (!jobId) { addLog('⚠️ Run step 1 first.'); return; }
    const btn = document.getElementById('btnVideo');
    btn.disabled = true; btn.textContent = 'Submitting render…';
    addLog('Calling /api/generate-video ...');
    try {
      const headline = document.getElementById('headline').value;
      const category = document.getElementById('category').value;
      const r = await fetch('/api/generate-video', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jobId, headline, category }),
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || ('Request failed: ' + r.status));
      renderId = data.renderId;
      setStatus(data.status);
      addLog('✅ Render queued. Render id: ' + renderId);
      addLog('Polling every 5s for completion ...');
      startPolling();
    } catch (e) {
      addLog('❌ ' + e.message);
    }
    btn.disabled = false; btn.textContent = 'Step 2 — Generate video';
  });

  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(async () => {
      try {
        const r = await fetch('/api/job-status?jobId=' + jobId);
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'status check failed');
        setStatus(data.status);
        if (data.status === 'done') {
          addLog('🎉 Video finished: ' + data.video_url);
          document.getElementById('videoBox').innerHTML =
            '<div class="meta">Finished video:</div><video controls src="' + data.video_url + '"></video>';
          clearInterval(pollTimer);
        } else if (data.status === 'failed') {
          addLog('❌ Render failed: ' + (data.error || 'unknown error'));
          clearInterval(pollTimer);
        } else {
          addLog('… still ' + data.status);
        }
      } catch (e) {
        addLog('⚠️ Poll error: ' + e.message);
      }
    }, 5000);
  }
</script>
</body>
</html>
